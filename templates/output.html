<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{title}</title>
  <style id="bundled-fonts">{bundled_fonts_css}</style>
  <style>
    html,body{{height:100%;margin:0;background:{bg};color:{fg};}}
    /* The window viewport clips the stage; the stage is a fixed-resolution canvas
       centred (flexbox) and uniformly scaled (see fitCanvas) to fit whatever
       display it lands on. Matching aspect ratios fill edge-to-edge; mismatched
       ones keep the design proportions and letterbox/pillarbox against the page
       background rather than distorting the content. */
    html,body{{overflow:hidden;}}
    body{{display:flex;align-items:center;justify-content:center;}}
    .canvas{{position:relative;flex:none;width:{canvas_w}px;height:{canvas_h}px;overflow:hidden;
      transform:scale(var(--fit-scale,1));transform-origin:center center;}}
    .bg-layer{{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;}}

    /* Song/Lyrics Text Box */
    .box{{position:absolute;z-index:2;left:{box_x}px;top:{box_y}px;width:{box_w}px;height:{box_h}px;box-sizing:border-box;padding:{pad}px;display:grid;align-items:{valign_css};overflow:hidden;opacity:{text_opacity};}}
    .text{{font-family:"{font_family}";font-size:{font_size}px;color:{fg};text-align:{align};line-height:1.2;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;grid-area:1/1;width:100%;}}
    .text-alt{{font-family:"{font_family}";font-size:{font_size}px;color:{fg};text-align:{align};line-height:1.2;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;grid-area:1/1;width:100%;opacity:0;}}

    /* Chord-over-lyric rendering (generated by _ChordProcessor in lyrics.py).
       Each syllable is an inline-flex column: chord on top, lyric below. */
    .cc{{display:inline-flex;flex-direction:column;align-items:flex-start;vertical-align:bottom;}}
    /* Default (overlap, mirrors OpenLP): the chord has zero width and overflows to the
       right above its syllable, so the lyric keeps its natural spacing — no gaps. It still
       occupies the row vertically, so chord lines reserve height and wrap cleanly. */
    .cc>.ch{{font-size:0.75em;line-height:1.25;font-weight:600;color:#ffd400;white-space:pre;width:0;overflow:visible;}}
    .cc>.ly{{line-height:1.2;white-space:pre;}}
    /* Expand: a chord wider than its syllable reclaims its own width (so it can't collide
       with the next chord) plus a small trailing gap, and the lyric row stretches to that
       width so the connector can bridge the surplus. */
    .cc.cc-x>.ch{{width:auto;padding-right:0.3em;}}
    .cc.cc-x>.ly{{display:flex;align-items:baseline;align-self:stretch;}}
    /* Dashed connector: zero intrinsic width, grows into a wide chord's surplus and paints
       a single centered dash there (e.g. "A — men"). */
    .cc.cc-x>.ly>.fl{{flex:1 1 0;min-width:0;align-self:stretch;background-image:linear-gradient(currentColor,currentColor);background-size:42% 0.07em;background-position:center 60%;background-repeat:no-repeat;}}

    /* Bible Text Box (separate from lyrics) */
    .bible-box{{position:absolute;z-index:2;left:{bible_text_box_x}px;top:{bible_text_box_y}px;width:{bible_text_box_w}px;height:{bible_text_box_h}px;box-sizing:border-box;padding:{bible_text_pad}px;display:none;align-items:{bible_text_valign_css};overflow:hidden;opacity:{bible_text_opacity};}}
    .bible-text{{font-family:"{bible_main_font_family}";font-size:{bible_main_font_size}px;color:{bible_text_color};text-align:{bible_text_align};line-height:1.2;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;grid-area:1/1;width:100%;}}
    .bible-text-alt{{font-family:"{bible_main_font_family}";font-size:{bible_main_font_size}px;color:{bible_text_color};text-align:{bible_text_align};line-height:1.2;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;grid-area:1/1;width:100%;opacity:0;}}
    .verse-num {{ font-size: 0.5em; vertical-align: super; margin-right: 0.4em; }}

    /* Bible Reference Box */
    .bible-ref{{position:absolute;z-index:2;left:{bible_ref_x}px;top:{bible_ref_y}px;width:{bible_ref_w}px;height:{bible_ref_h}px;box-sizing:border-box;display:none;align-items:{bible_ref_valign_css};justify-content:{bible_ref_justify};font-family:"{bible_ref_font_family}";font-size:{bible_ref_font_size}px;color:{bible_ref_color};white-space:pre-wrap;opacity:{bible_ref_opacity};}}

    /* Copyright Info Box */
    .copyright-box{{position:absolute;z-index:2;left:{copyright_x}px;top:{copyright_y}px;width:{copyright_w}px;height:{copyright_h}px;box-sizing:border-box;display:none;align-items:{copyright_valign_css};font-family:"{copyright_font_family}";font-size:{copyright_font_size}px;color:{copyright_color};white-space:pre-wrap;text-align:{copyright_align};opacity:{copyright_opacity};}}

    /* Indicator */
    .indicator{{position:absolute;z-index:2;left:{ind_x}px;top:{ind_y}px;font-family:"{font_family}";font-size:{ind_fs}px;color:{ind_color};white-space:nowrap;opacity:{ind_opacity};}}

    /* Video countdown */
    #video-countdown{{position:absolute;z-index:4;left:{countdown_x}px;top:{countdown_y}px;font-family:"{countdown_font_family}";font-size:{countdown_fs}px;color:{countdown_color};white-space:nowrap;text-align:{countdown_align};opacity:0;}}
    .canvas.video-mode #video-countdown{{opacity:{countdown_opacity};}}
    .ind-item{{display:inline-block; margin-right:8px; opacity:0.5;}}
    .ind-item.active{{opacity:1; font-weight:bold; color:white;}}
    
    /* Mode Classes */
    .canvas.song-mode .box {{ display: grid; }}
    .canvas.song-mode .bible-box {{ display: none; }}
    .canvas.song-mode .bible-ref {{ display: none; }}
    .canvas.song-mode .copyright-box {{ display: grid; }}

    .canvas.bible-mode .box {{ display: none; }}
    .canvas.bible-mode .bible-box {{ display: grid; }}
    .canvas.bible-mode .bible-ref {{ display: flex; }}
    .canvas.bible-mode .copyright-box {{ display: none; }}
    .canvas.bible-mode .indicator {{ display: none !important; }}

    .canvas.announcement-mode .copyright-box {{ display: none; }}
    .canvas.service-mode .copyright-box {{ display: grid; }}

    /* Video mode */
    #video-el {{ position:absolute; left:{video_x}px; top:{video_y}px; width:{video_w}px; height:{video_h}px; object-fit:contain; z-index:3; display:none; background:#000; }}
    .canvas.video-mode #video-el {{ display:block; }}
    .canvas.video-mode .box {{ display:none; }}
    .canvas.video-mode .bible-box {{ display:none; }}
    .canvas.video-mode .bible-ref {{ display:none; }}
    .canvas.video-mode .copyright-box {{ display:none; }}
    .canvas.video-mode .indicator {{ display:none !important; }}

    /* Image mode */
    #image-el {{ position:absolute; left:{image_x}px; top:{image_y}px; width:{image_w}px; height:{image_h}px; object-fit:{image_fit}; z-index:3; display:none; }}
    .canvas.image-mode #image-el {{ display:block; }}
    .canvas.image-mode .box {{ display:none; }}
    .canvas.image-mode .bible-box {{ display:none; }}
    .canvas.image-mode .bible-ref {{ display:none; }}
    .canvas.image-mode .copyright-box {{ display:none; }}
    .canvas.image-mode .indicator {{ display:none !important; }}

    /* Announcement template mode */
    #ann-layer {{ position:absolute; inset:0; z-index:4; display:none; }}
    .canvas.ann-template-mode #ann-layer {{ display:block; }}
    .canvas.ann-template-mode .box {{ display:none; }}
    .canvas.ann-template-mode .bible-box {{ display:none; }}
    .canvas.ann-template-mode .bible-ref {{ display:none; }}
    .canvas.ann-template-mode .copyright-box {{ display:none; }}
    .canvas.ann-template-mode .indicator {{ display:none !important; }}
  </style>
</head>
<body>
  <div id="canvas" class="canvas song-mode">
    <!-- Double-buffered background layers: prevents flash during image transitions -->
    <div id="bg-a" class="bg-layer" style="z-index:1;{initial_bg_a}"></div>
    <div id="bg-b" class="bg-layer" style="z-index:0;"></div>

    <!-- Song/Lyrics Text Box -->
    <div class="box">
      <div id="text" class="text">{initial}</div>
      <div id="text-alt" class="text-alt"></div>
    </div>

    <!-- Bible Text Box (separate) -->
    <div class="bible-box">
      <div id="bible-text" class="bible-text"></div>
      <div id="bible-text-alt" class="bible-text-alt"></div>
    </div>

    <!-- Bible Reference Box -->
    <div id="bible-ref" class="bible-ref"></div>

    <!-- Copyright Info Box -->
    <div id="copyright-box" class="copyright-box"></div>

    <!-- Indicator -->
    <div id="indicator" class="indicator"></div>

    <!-- Video countdown timer (shown only in video-mode when enabled) -->
    <div id="video-countdown"></div>

    <!-- Video element (shown only in video-mode) -->
    <video id="video-el" preload="auto"></video>

    <!-- Image element (shown only in image-mode) -->
    <img id="image-el" />

    <!-- Announcement template layer (shown only in ann-template-mode) -->
    <div id="ann-layer"></div>
  </div>
<script>
// Fade transition configuration
let ENABLE_FADE = {enable_fade};
let FADE_DURATION = {fade_duration};
let VIDEO_ENABLED = {video_enabled};
let IMAGE_ENABLED = {image_enabled};
const IS_PREVIEW = new URLSearchParams(window.location.search).has('preview');
if (IS_PREVIEW) {{ document.getElementById('video-el').muted = true; }}
let previewVideoMode = 'still';
let holdFrame = false;
let songContainerIndex = 0;
let bibleContainerIndex = 0;
let lastSlideHtml = '';
let lastTransitionKey = '';
let currentMode = 'song';
let currentTransitionKey = '';

// === Background Management ===
// Double-buffered: two absolutely-positioned layers swap so the old
// background stays visible while a new image loads — no flash ever.
const imageCache = new Set();
let bgActive = 'a';
let currentBgKey = '{initial_bg_key}';

function preloadImage(url) {{
    if (!url || imageCache.has(url)) return Promise.resolve();
    return new Promise(resolve => {{
        const img = new Image();
        img.onload = () => {{ imageCache.add(url); resolve(); }};
        img.onerror = () => {{ resolve(); }};
        img.src = url;
    }});
}}

function preloadImages(urls) {{
    if (!urls || !Array.isArray(urls)) return;
    urls.forEach(url => {{ if (url && !imageCache.has(url)) preloadImage(url); }});
}}

const videoPreloadCache = new Set();
function preloadVideos(urls) {{
    if (IS_PREVIEW || !urls || !Array.isArray(urls)) return;
    urls.forEach(url => {{
        if (url && !videoPreloadCache.has(url)) {{
            videoPreloadCache.add(url);
            const v = document.createElement('video');
            v.preload = 'auto';
            v.muted = true;
            v.src = url;
            v.style.cssText = 'position:absolute;width:1px;height:1px;left:-9999px;opacity:0;pointer-events:none;';
            // Seek to frame 0 once data is available so the browser decodes
            // and caches that frame — #video-el can then show it near-instantly.
            v.addEventListener('loadeddata', () => {{ v.currentTime = 0; }}, {{once: true}});
            document.body.appendChild(v);
        }}
    }});
}}

function switchBackground(bgType, bgColor, bgImage) {{
    // Build a key that uniquely identifies this background state
    let key, bgCss, imgCss;
    if (bgType === 'image' && bgImage) {{
        key = 'i:' + bgImage;
        bgCss = 'transparent';
        imgCss = "url('" + bgImage + "')";
    }} else if (bgType === 'color') {{
        key = 'c:' + (bgColor || '#000000');
        bgCss = bgColor || '#000000';
        imgCss = 'none';
    }} else {{
        key = 't';
        bgCss = 'transparent';
        imgCss = 'none';
    }}
    if (key === currentBgKey) return;

    const nextId = bgActive === 'a' ? 'b' : 'a';
    const nextEl = document.getElementById('bg-' + nextId);
    const currEl = document.getElementById('bg-' + bgActive);

    const doSwap = () => {{
        nextEl.style.backgroundColor = bgCss;
        nextEl.style.backgroundImage = imgCss;
        nextEl.style.zIndex = '1';
        currEl.style.zIndex = '0';
        if (bgType !== 'image') {{
            currEl.style.backgroundColor = 'transparent';
            currEl.style.backgroundImage = 'none';
        }}
        bgActive = nextId;
        currentBgKey = key;
        // Sync page background for areas outside the fixed-size canvas
        [document.body, document.documentElement].forEach(el => {{
            el.style.backgroundColor = bgCss;
            el.style.backgroundImage = imgCss;
            el.style.backgroundSize = 'cover';
            el.style.backgroundPosition = 'center';
            el.style.backgroundRepeat = 'no-repeat';
        }});
    }};

    // For uncached images, the current layer stays visible while the
    // new image loads into the hidden layer — zero flash guaranteed.
    if (bgType === 'image' && bgImage && !imageCache.has(bgImage)) {{
        preloadImage(bgImage).then(doSwap);
    }} else {{
        doSwap();
    }}
}}

function applyFontCss(css) {{
    if (css === undefined || css === null) return;
    const cssText = String(css);
    let el = document.getElementById('bundled-fonts');
    if (!el) {{
        el = document.createElement('style');
        el.id = 'bundled-fonts';
        document.head.appendChild(el);
    }}
    if (el.textContent !== cssText) el.textContent = cssText;
}}

function applyStyle(s) {{
    if (!s) return;
    const toPx = (val) => String(parseInt(val)) + 'px';
    // Map a vertical-align keyword to its CSS value. startVal/endVal differ per element
    // (e.g. 'start'/'end' for grid boxes, 'flex-start'/'flex-end' for flex containers).
    const valignTo = (v, startVal, endVal) => (v === 'top') ? startVal : ((v === 'bottom') ? endVal : 'center');
    const canvas = document.getElementById('canvas');
    const box = document.querySelector('.box');
    const ind = document.getElementById('indicator');
    const bibleBox = document.querySelector('.bible-box');
    const bibleRef = document.getElementById('bible-ref');

    if (s.enable_fade !== undefined) ENABLE_FADE = !!s.enable_fade;
    if (s.fade_duration !== undefined) FADE_DURATION = parseInt(s.fade_duration);

    if (s.canvas_width !== undefined) canvas.style.width = toPx(s.canvas_width);
    if (s.canvas_height !== undefined) canvas.style.height = toPx(s.canvas_height);
    if (s.canvas_width !== undefined || s.canvas_height !== undefined) fitCanvas();

    // Resolve effective background (Bible mode can override)
    let bgType = s.background_type != null ? String(s.background_type) : '';
    let bgColor = s.background_color != null ? String(s.background_color) : '';
    let bgImage = s.background_image != null ? String(s.background_image) : '';
    if (currentMode === 'bible') {{
        const bbt = s.bible_background_type != null ? String(s.bible_background_type) : '';
        if (bbt && bbt !== 'inherit') {{
            bgType = bbt;
            if (s.bible_background_color != null) bgColor = String(s.bible_background_color);
            if (s.bible_background_image != null) bgImage = String(s.bible_background_image);
        }}
    }}
    if (currentMode === 'image') {{
        switchBackground('transparent', '', '');
    }} else if (bgType) {{
        switchBackground(bgType, bgColor, bgImage);
    }}

    if (box) {{
        if (s.box_x !== undefined) box.style.left = toPx(s.box_x);
        if (s.box_y !== undefined) box.style.top = toPx(s.box_y);
        if (s.width_px !== undefined) box.style.width = toPx(s.width_px);
        if (s.height_px !== undefined) box.style.height = toPx(s.height_px);
        if (s.area_padding !== undefined) box.style.padding = toPx(s.area_padding);
        if (s.valign) box.style.alignItems = valignTo(s.valign, 'start', 'end');
        if (s.text_opacity !== undefined) box.style.opacity = s.text_opacity;
    }}

    const texts = [document.getElementById('text'), document.getElementById('text-alt')];
    for (let i = 0; i < texts.length; i++) {{
        const t = texts[i];
        if (!t) continue;
        if (s.font_family !== undefined) t.style.fontFamily = s.font_family;
        if (s.font_size !== undefined) t.style.fontSize = toPx(s.font_size);
        if (s.align !== undefined) t.style.textAlign = s.align;
        // Base song-text color. When follow-lines highlighting is on, the per-line
        // inline span color overrides this; when off, this is the only color source.
        if (s.highlight_color !== undefined) t.style.color = s.highlight_color;
    }}

    if (ind) {{
        if (s.indicator_x !== undefined) ind.style.left = toPx(s.indicator_x);
        if (s.indicator_y !== undefined) ind.style.top = toPx(s.indicator_y);
        if (s.indicator_font_size !== undefined) ind.style.fontSize = toPx(s.indicator_font_size);
        if (s.font_family !== undefined) ind.style.fontFamily = s.font_family;
        if (s.show_indicator !== undefined || s.indicator_opacity !== undefined) ind.style.opacity = (s.show_indicator !== undefined ? s.show_indicator : true) ? (s.indicator_opacity !== undefined ? s.indicator_opacity : 1) : 0;
    }}

    if (bibleBox) {{
        if (s.bible_text_box_x !== undefined) bibleBox.style.left = toPx(s.bible_text_box_x);
        if (s.bible_text_box_y !== undefined) bibleBox.style.top = toPx(s.bible_text_box_y);
        if (s.bible_text_box_width !== undefined) bibleBox.style.width = toPx(s.bible_text_box_width);
        if (s.bible_text_box_height !== undefined) bibleBox.style.height = toPx(s.bible_text_box_height);
        if (s.bible_text_padding !== undefined) bibleBox.style.padding = toPx(s.bible_text_padding);
        if (s.bible_text_valign) bibleBox.style.alignItems = valignTo(s.bible_text_valign, 'start', 'end');
        if (s.show_bible_text !== undefined || s.bible_text_opacity !== undefined) bibleBox.style.opacity = (s.show_bible_text !== undefined ? s.show_bible_text : true) ? (s.bible_text_opacity !== undefined ? s.bible_text_opacity : 1) : 0;
    }}

    const bibleTexts = [document.getElementById('bible-text'), document.getElementById('bible-text-alt')];
    for (let i = 0; i < bibleTexts.length; i++) {{
        const t = bibleTexts[i];
        if (!t) continue;
        if (s.bible_main_font_family !== undefined) t.style.fontFamily = s.bible_main_font_family;
        if (s.bible_main_font_size !== undefined) t.style.fontSize = toPx(s.bible_main_font_size);
        if (s.bible_text_color !== undefined) t.style.color = s.bible_text_color;
        if (s.bible_text_align !== undefined) t.style.textAlign = s.bible_text_align;
    }}

    if (bibleRef) {{
        if (s.bible_ref_box_x !== undefined) bibleRef.style.left = toPx(s.bible_ref_box_x);
        if (s.bible_ref_box_y !== undefined) bibleRef.style.top = toPx(s.bible_ref_box_y);
        if (s.bible_ref_width !== undefined) bibleRef.style.width = toPx(s.bible_ref_width);
        if (s.bible_ref_height !== undefined) bibleRef.style.height = toPx(s.bible_ref_height);
        if (s.bible_ref_font_family !== undefined) bibleRef.style.fontFamily = s.bible_ref_font_family;
        if (s.bible_ref_font_size !== undefined) bibleRef.style.fontSize = toPx(s.bible_ref_font_size);
        if (s.bible_ref_color !== undefined) bibleRef.style.color = s.bible_ref_color;
        if (s.bible_ref_align) bibleRef.style.justifyContent = (s.bible_ref_align === 'left') ? 'flex-start' : ((s.bible_ref_align === 'right') ? 'flex-end' : 'center');
        if (s.bible_ref_valign) bibleRef.style.alignItems = valignTo(s.bible_ref_valign, 'flex-start', 'flex-end');
        if (s.show_bible_ref !== undefined || s.bible_ref_opacity !== undefined) bibleRef.style.opacity = (s.show_bible_ref !== undefined ? s.show_bible_ref : true) ? (s.bible_ref_opacity !== undefined ? s.bible_ref_opacity : 1) : 0;
    }}

    const copyrightBox = document.getElementById('copyright-box');
    if (copyrightBox) {{
        if (s.copyright_box_x !== undefined) copyrightBox.style.left = toPx(s.copyright_box_x);
        if (s.copyright_box_y !== undefined) copyrightBox.style.top = toPx(s.copyright_box_y);
        if (s.copyright_box_width !== undefined) copyrightBox.style.width = toPx(s.copyright_box_width);
        if (s.copyright_box_height !== undefined) copyrightBox.style.height = toPx(s.copyright_box_height);
        if (s.copyright_font_family !== undefined) copyrightBox.style.fontFamily = s.copyright_font_family;
        if (s.copyright_font_size !== undefined) copyrightBox.style.fontSize = toPx(s.copyright_font_size);
        if (s.copyright_color !== undefined) copyrightBox.style.color = s.copyright_color;
        if (s.copyright_align) copyrightBox.style.textAlign = s.copyright_align;
        if (s.copyright_valign) copyrightBox.style.alignItems = valignTo(s.copyright_valign, 'start', 'end');
        if (s.show_copyright !== undefined || s.copyright_text_opacity !== undefined) copyrightBox.style.opacity = (s.show_copyright !== undefined ? s.show_copyright : true) ? (s.copyright_text_opacity !== undefined ? s.copyright_text_opacity : 1) : 0;
    }}

    const imageEl = document.getElementById('image-el');
    if (imageEl) {{
        const canvas = document.getElementById('canvas');
        const cw = s.canvas_width || parseInt(canvas.style.width) || {image_w};
        const ch = s.canvas_height || parseInt(canvas.style.height) || {image_h};
        if (s.image_area_x !== undefined) imageEl.style.left = toPx(s.image_area_x);
        if (s.image_area_y !== undefined) imageEl.style.top = toPx(s.image_area_y);
        if (s.image_area_width !== undefined) imageEl.style.width = toPx(s.image_area_width > 0 ? s.image_area_width : cw);
        if (s.image_area_height !== undefined) imageEl.style.height = toPx(s.image_area_height > 0 ? s.image_area_height : ch);
        if (s.image_fit !== undefined) imageEl.style.objectFit = s.image_fit;
        if (s.image_enabled !== undefined) IMAGE_ENABLED = !!s.image_enabled;
    }}
}}

// Uniformly scale the fixed-resolution stage to fit the current viewport,
// preserving aspect ratio (letterbox/pillarbox on mismatch). Driven by the CSS
// var --fit-scale on #canvas. Recomputed on resize and whenever the design
// resolution changes. offsetWidth/Height are the unscaled layout size, so the
// ratio is correct regardless of the current transform. The browser renders the
// scaled content at the display's native pixel density, so output stays crisp
// even when scaled up onto a 4K panel (or down onto a smaller one).
function fitCanvas() {{
    const canvas = document.getElementById('canvas');
    if (!canvas) return;
    // offsetWidth/Height are the unscaled layout size; clientWidth/Height of the
    // root is the true viewport, so the ratio is correct regardless of the
    // current transform or any device-pixel scaling on the display.
    const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
    const vw = document.documentElement.clientWidth, vh = document.documentElement.clientHeight;
    if (!cw || !ch || !vw || !vh) return;
    const scale = Math.min(vw / cw, vh / ch);
    canvas.style.setProperty('--fit-scale', scale > 0 ? String(scale) : '1');
}}
window.addEventListener('resize', fitCanvas);
// Going fullscreen or moving to another monitor doesn't always emit a timely
// 'resize' event; observe the viewport box so the fit also recomputes then.
if (window.ResizeObserver) {{
    new ResizeObserver(fitCanvas).observe(document.documentElement);
}}

// Initial load check (if page loaded with content)
const initialContent = document.getElementById('text').innerHTML;
if (initialContent) lastSlideHtml = initialContent;

let ws;
function connect() {{
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + window.location.host + '/ws?client_type=output&output_name={output_name}');

    ws.onmessage = (event) => {{
        try {{
            const data = JSON.parse(event.data);

            // Always-apply: preloads and settings updates
            if (data.preload_images !== undefined) {{
                preloadImages(data.preload_images);
            }}
            if (data.preload_videos !== undefined) {{
                preloadVideos(data.preload_videos);
            }}
            if (data.font_css !== undefined) {{
                applyFontCss(data.font_css);
            }}
            if (data.preview_video_mode !== undefined) {{
                previewVideoMode = data.preview_video_mode;
            }}

            // Hold frame: while server is buffering video, keep current display visible.
            // Silently load the video into the element so it's ready to go instantly.
            if (data.hold_frame !== undefined) {{
                holdFrame = data.hold_frame;
            }}
            if (holdFrame) {{
                if (VIDEO_ENABLED && data.video_url) {{
                    const v = document.getElementById('video-el');
                    const effectiveLive = !IS_PREVIEW || previewVideoMode === 'live';
                    const effectiveStill = IS_PREVIEW && previewVideoMode === 'still';
                    if ((effectiveLive || effectiveStill) && v.dataset.src !== data.video_url) {{
                        v.src = data.video_url;
                        v.dataset.src = data.video_url;
                        v.loop = !!data.video_loop;
                        v.load();
                    }}
                }}
                return;
            }}

            // Normal display updates (only reached when hold_frame is false)

            // Mode must be set before style so Bible bg override resolves correctly
            if (data.mode !== undefined) {{
                const effectiveMode = (!VIDEO_ENABLED && data.mode === 'video') ? currentMode : data.mode;
                setMode(effectiveMode);
                // Pause audio whenever leaving video mode
                if (effectiveMode !== 'video') {{
                    const v = document.getElementById('video-el');
                    if (v && !v.paused) v.pause();
                }}
                // Clear image when leaving image mode
                if (effectiveMode !== 'image') {{
                    const imgEl = document.getElementById('image-el');
                    if (imgEl && imgEl.src) {{ imgEl.removeAttribute('src'); }}
                }}
            }}

            if (data.transition_key !== undefined) {{
                currentTransitionKey = data.transition_key;
            }}

            if (data.style !== undefined) {{
                applyStyle(data.style);
            }}

            // Announcement template layer
            if (data.template_html !== undefined) {{
                const canvas = document.getElementById('canvas');
                const annLayer = document.getElementById('ann-layer');
                if (data.template_html && !data.is_blank) {{
                    annLayer.innerHTML = data.template_html;
                    canvas.classList.add('ann-template-mode');
                }} else {{
                    annLayer.innerHTML = '';
                    canvas.classList.remove('ann-template-mode');
                }}
            }}

            if (data.html !== undefined) {{
                updateSlide(data.html);
            }}

            if (data.bible_ref !== undefined) {{
                document.getElementById('bible-ref').textContent = data.bible_ref;
            }}

            if (data.copyright_info !== undefined) {{
                document.getElementById('copyright-box').textContent = data.copyright_info;
            }}

            if (data.indicator !== undefined) {{
                document.getElementById('indicator').innerHTML = data.indicator;
            }}

            // Video state update — sync position and play/pause
            if (VIDEO_ENABLED && data.video_url !== undefined) {{
                const v = document.getElementById('video-el');
                const effectiveLive = !IS_PREVIEW || previewVideoMode === 'live';
                const effectiveStill = IS_PREVIEW && previewVideoMode === 'still';
                if (!effectiveLive && !effectiveStill) {{
                    // preview_video_mode === 'disabled': do nothing
                }} else if (data.video_url === null) {{
                    v.pause();
                }} else {{
                    const targetPos = data.video_position || 0;
                    const shouldPlay = !!data.video_autoplay;
                    const isNew = v.dataset.src !== data.video_url;
                    if (isNew) {{
                        v.src = data.video_url;
                        v.dataset.src = data.video_url;
                        v.loop = !!data.video_loop;
                    }}
                    if (effectiveStill) {{
                        const showStill = () => {{
                            v.currentTime = targetPos;
                            v.pause();
                        }};
                        if (v.readyState >= 1) {{ showStill(); }}
                        else {{ v.addEventListener('loadedmetadata', function _h() {{ v.removeEventListener('loadedmetadata', _h); showStill(); }}); }}
                    }} else {{
                        const syncAndPlay = () => {{
                            if (isNew || Math.abs(v.currentTime - targetPos) > 3) {{ v.currentTime = targetPos; }}
                            if (shouldPlay) {{ v.play().catch(() => {{}}); }} else {{ v.pause(); }}
                        }};
                        if (v.readyState >= 1) {{ syncAndPlay(); }}
                        else {{ v.addEventListener('loadedmetadata', function _h() {{ v.removeEventListener('loadedmetadata', _h); syncAndPlay(); }}); }}
                    }}
                }}
            }}

            // Real-time video commands (play/pause/restart/seek)
            if (VIDEO_ENABLED && (!IS_PREVIEW || previewVideoMode === 'live') && data.video_command !== undefined) {{
                const v = document.getElementById('video-el');
                if (data.video_command === 'play') v.play().catch(() => {{}});
                else if (data.video_command === 'pause') v.pause();
                else if (data.video_command === 'restart') {{ v.currentTime = 0; v.play().catch(() => {{}}); }}
                else if (data.video_command === 'seek' && data.video_position !== undefined) {{ v.currentTime = data.video_position; }}
            }}

            // Image state update
            if (IMAGE_ENABLED && data.image_url !== undefined) {{
                const imgEl = document.getElementById('image-el');
                if (data.image_url === null) {{
                    imgEl.removeAttribute('src');
                }} else if (imgEl.src !== data.image_url) {{
                    imgEl.src = data.image_url;
                }}
            }}
        }} catch(e) {{
            console.error('WS parse error', e);
        }}
    }};

    ws.onclose = () => {{
        setTimeout(connect, 1000);
    }};

    ws.onerror = (err) => {{
        console.error('WS error', err);
        ws.close();
    }};
}}

let countdownInterval = null;

function formatCountdown(remaining) {{
    const neg = remaining < 0;
    const abs = Math.abs(Math.ceil(remaining));
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (neg ? '-' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}}

function updateCountdown() {{
    const v = document.getElementById('video-el');
    const el = document.getElementById('video-countdown');
    if (!v || !el) return;
    if (isNaN(v.duration) || v.duration === Infinity) {{
        el.textContent = '';
        return;
    }}
    el.textContent = formatCountdown(v.currentTime - v.duration);
}}

function setMode(mode) {{
    const wasVideo = currentMode === 'video';
    currentMode = mode;
    const canvas = document.getElementById('canvas');
    canvas.className = 'canvas ' + mode + '-mode';
    if (mode === 'video') {{
        if (!IS_PREVIEW && !countdownInterval) {{
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 500);
        }}
    }} else {{
        if (countdownInterval) {{
            clearInterval(countdownInterval);
            countdownInterval = null;
        }}
        document.getElementById('video-countdown').textContent = '';
        // Clear the video element when leaving video mode so the stale last
        // frame never shows during the buffer window of the next video.
        if (wasVideo) {{
            const v = document.getElementById('video-el');
            v.pause();
            v.removeAttribute('src');
            v.load();
            delete v.dataset.src;
        }}
    }}
}}

function updateSlide(newSlideHtml) {{
    const isBlank = newSlideHtml === '';
    const effectiveKey = currentTransitionKey || currentMode;
    const modeChanged = effectiveKey !== lastTransitionKey;

    if (newSlideHtml !== lastSlideHtml || modeChanged) {{
      lastSlideHtml = newSlideHtml;
      lastTransitionKey = effectiveKey;

      // Render newSlideHtml into the primary/alt container pair, fading between them
      // when enabled. Returns the new container index. Closes over newSlideHtml,
      // isBlank, modeChanged, ENABLE_FADE and FADE_DURATION.
      const renderSlideInto = (primaryId, altId, containerIndex) => {{
          if (ENABLE_FADE && !modeChanged) {{
            const currentContainer = document.getElementById(containerIndex === 0 ? primaryId : altId);
            const nextContainer = document.getElementById(containerIndex === 0 ? altId : primaryId);
            nextContainer.innerHTML = newSlideHtml;
            currentContainer.style.transition = 'opacity ' + String(FADE_DURATION) + 'ms ease-in-out';
            nextContainer.style.transition = 'opacity ' + String(FADE_DURATION) + 'ms ease-in-out';
            currentContainer.style.opacity = '0';
            nextContainer.style.opacity = isBlank ? '0' : '1';
            return 1 - containerIndex;
          }} else {{
            const p = document.getElementById(primaryId);
            const a = document.getElementById(altId);
            p.style.transition = 'none';
            a.style.transition = 'none';
            p.innerHTML = newSlideHtml;
            a.innerHTML = '';
            p.style.opacity = isBlank ? '0' : '1';
            a.style.opacity = '0';
            return 0;
          }}
      }};

      if (currentMode === 'bible') {{
          bibleContainerIndex = renderSlideInto('bible-text', 'bible-text-alt', bibleContainerIndex);
      }} else {{
          songContainerIndex = renderSlideInto('text', 'text-alt', songContainerIndex);
      }}
    }}
}}

fitCanvas();
connect();
</script>
