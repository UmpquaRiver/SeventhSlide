name: Build – Linux

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig libfontconfig1 rpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Freeze backend with PyInstaller
        run: pyinstaller lyrics.spec

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app (deb + rpm)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: SeventhSlide-Linux-deb
          path: electron-dist/*.deb
          if-no-files-found: error

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: SeventhSlide-Linux-rpm
          path: electron-dist/*.rpm
          if-no-files-found: error
