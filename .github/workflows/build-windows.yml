name: Build – Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Freeze backend with PyInstaller
        run: pyinstaller lyrics.spec

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app (unpacked folder)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: pwsh

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\SeventhSlide.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SeventhSlide-Windows-Setup
          path: installer-output/*.exe
          if-no-files-found: error

      # On a version-tag build, attach the installer to the release for that tag
      # (creating the release if it doesn't exist yet). Skipped for workflow_dispatch
      # runs, which have no tag.
      - name: Attach binaries to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-output/*.exe
          fail_on_unmatched_files: true
